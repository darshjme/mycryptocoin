# ===========================================================================
# MyCryptoCoin — Strong SSL Configuration
#
# TLS 1.2+ only, modern cipher suite, OCSP stapling, DH parameters.
# Based on Mozilla "Intermediate" configuration.
# ===========================================================================

# ---------- Protocol & Ciphers --------------------------------------------
ssl_protocols TLSv1.2 TLSv1.3;

ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;

ssl_prefer_server_ciphers off;

# ---------- DH Parameters ------------------------------------------------
# Generate with: openssl dhparam -out /etc/nginx/dhparam.pem 4096
# NOTE: dhparam.pem must be generated during server setup (see setup-server.sh)
ssl_dhparam /etc/nginx/dhparam.pem;

# ---------- SSL Session ---------------------------------------------------
ssl_session_timeout 1d;
ssl_session_cache shared:MCC_SSL:50m;
ssl_session_tickets off;

# ---------- OCSP Stapling ------------------------------------------------
ssl_stapling on;
ssl_stapling_verify on;

# Trust chain for OCSP stapling (Let's Encrypt)
ssl_trusted_certificate /etc/letsencrypt/live/api.mycryptocoin.com/chain.pem;

# DNS resolver for OCSP (Cloudflare + Google)
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# ---------- HSTS (also set in server block, but belt + suspenders) --------
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
