# ===========================================================================
# MyCryptoCoin — Nginx Reverse Proxy Configuration
#
# Features:
#   - SSL termination (TLS 1.2+)
#   - Gzip compression
#   - Rate limiting at nginx level
#   - WebSocket upgrade support
#   - Security headers
#   - Static file caching
# ===========================================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------- Logging ---------------------------------------------------
    log_format main_json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request_id":"$request_id",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"upstream_addr":"$upstream_addr"'
    '}';

    access_log /var/log/nginx/access.log main_json;

    # ---------- Performance -----------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # ---------- Gzip Compression ------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/xml+rss
        text/css
        text/javascript
        text/plain
        text/xml;

    # ---------- Rate Limiting (Nginx level) --------------------------------
    # General API rate limit: 50 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_general:20m rate=50r/s;

    # Authentication endpoints: 10 req/s per IP (brute force protection)
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/s;

    # Payment creation: 20 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_payments:10m rate=20r/s;

    # WebSocket connections: 5 per IP
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    limit_req_status 429;
    limit_conn_status 429;

    # ---------- Upstream (backend replicas) --------------------------------
    # Docker internal DNS resolver for dynamic service discovery.
    # With Docker Compose replicas, the 'backend' hostname resolves to
    # multiple IPs. Nginx open-source re-resolves on reload or restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream backend {
        least_conn;
        server backend:4000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ---------- Map for WebSocket upgrade ---------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ---------- HTTP → HTTPS redirect -------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Liveness probe (no redirect)
        location /healthz {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------- HTTPS server ----------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.mycryptocoin.com;

        # SSL certificates
        ssl_certificate     /etc/letsencrypt/live/api.mycryptocoin.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.mycryptocoin.com/privkey.pem;

        # Import strong SSL parameters
        include /etc/nginx/ssl-params.conf;

        # ---------- Security Headers --------------------------------------
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none';" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ---------- Health check ------------------------------------------
        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Request-ID $request_id;
            access_log off;
        }

        location /healthz {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
            access_log off;
        }

        location /ready {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ---------- Authentication endpoints (stricter rate limit) --------
        location ~ ^/api/v1/auth/ {
            limit_req zone=api_auth burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # ---------- Payment endpoints -------------------------------------
        location ~ ^/api/v1/payments/ {
            limit_req zone=api_payments burst=40 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_send_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # ---------- WebSocket endpoint ------------------------------------
        location /socket.io/ {
            limit_conn ws_conn 10;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ---------- All other API routes ----------------------------------
        location /api/ {
            limit_req zone=api_general burst=100 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            proxy_connect_timeout 10s;
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        # ---------- Block everything else ---------------------------------
        location / {
            return 404 '{"error":"Not Found"}';
            add_header Content-Type application/json;
        }

        # ---------- Deny hidden files ------------------------------------
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
