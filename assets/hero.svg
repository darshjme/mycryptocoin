<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F7931A"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)" rx="10"/>
  <!-- Network nodes -->
  <circle cx="80" cy="90" r="3" fill="#F7931A" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="45" r="2" fill="#627EEA" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="155" r="2.5" fill="#26A17B" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="35" r="1.5" fill="#9945FF" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="460" cy="165" r="2" fill="#2775CA" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="540" cy="40" r="2.5" fill="#E84142" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="630" cy="150" r="2" fill="#00D395" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="70" r="3" fill="#F7931A" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="160" r="1.5" fill="#FFD700" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="170" r="2" fill="#E6007A" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <!-- Title -->
  <text x="400" y="88" text-anchor="middle" fill="url(#gold)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="44" font-weight="bold">MyCryptoCoin</text>
  <!-- Subtitle -->
  <text x="400" y="125" text-anchor="middle" fill="#8b949e" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="18">the stripe of crypto payments</text>
  <!-- Tagline -->
  <text x="400" y="160" text-anchor="middle" fill="#58A6FF" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="13">One API. Every Chain. 0.5% Flat Fee.</text>
</svg>
